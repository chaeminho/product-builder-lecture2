<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="email"], textarea, select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        textarea { height: 120px; resize: vertical; }
        button {
            width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>제휴 문의하기</h2>
    <form action="https://formspree.io/f/xgorwaqo" method="POST">
        
        <div class="form-group">
            <label for="company">회사명 / 담당자 성함</label>
            <input type="text" id="company" name="company" placeholder="예: (주)게미니 / 홍길동" required>
        </div>

        <div class="form-group">
            <label for="email">회신 받을 이메일</label>
            <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
            <label for="type">문의 유형</label>
            <select id="type" name="type">
                <option value="marketing">마케팅/광고 제휴</option>
                <option value="content">콘텐츠 협업</option>
                <option value="technical">기술/API 연동</option>
                <option value="other">기타 문의</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">상세 내용</label>
            <textarea id="message" name="message" placeholder="제휴 제안 내용을 상세히 적어주세요." required></textarea>
        </div>

        <input type="hidden" name="_subject" value="새로운 제휴 문의가 접수되었습니다!">
        
        <button type="submit">문의 보내기</button>
    </form>
</div>

</body>
</html>
