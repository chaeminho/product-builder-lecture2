<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - 저녁 메뉴 추천</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5402805160992455"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-5402805160992455">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">
    <a href="animal.html" class="lang-switch">🐶 동물상 테스트</a>
    <a href="en.html" class="lang-switch">🇺🇸 English</a>
    <button id="theme-toggle" class="theme-toggle-btn">🌙 다크 모드</button>
</div>

<div class="container">
    <header>
        <h1>🍽️ 오늘 뭐 먹지?</h1>
        <p>결정 장애를 위한 저녁 메뉴 추천 시스템</p>
    </header>

    <div class="recommend-box">
        <div id="menu-display" class="menu-display">
            <div id="menu-text">메뉴를 추천받아보세요!</div>
            <img id="menu-image" class="menu-image" src="" alt="추천 메뉴 이미지" style="display: none;">
        </div>
        <button id="recommend-btn" class="recommend-btn">오늘의 메뉴 추천받기</button>
    </div>

    <div class="category-filters">
        <label><input type="checkbox" name="category" value="korean" checked> 한식</label>
        <label><input type="checkbox" name="category" value="chinese" checked> 중식</label>
        <label><input type="checkbox" name="category" value="japanese" checked> 일식</label>
        <label><input type="checkbox" name="category" value="western" checked> 양식</label>
        <label><input type="checkbox" name="category" value="others" checked> 기타</label>
    </div>

    <hr class="divider">

    <section class="contact-section">
        <h2>🤝 제휴 문의</h2>
        <p>비즈니스 제휴 및 협업 제안을 기다립니다.</p>
        <form action="https://formspree.io/f/mpqkdood" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">성함 / 업체명</label>
                <input type="text" id="name" name="name" placeholder="홍길동 / 맛집컴퍼니" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="제휴 제안 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
    </section>

    <hr class="divider">

    <section class="comments-section">
        <h2>💬 댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-ai5swixxa2.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
</div>

<script src="main.js"></script>
</body>
</html>
