<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 나는 어떤 동물일까?</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5402805160992455"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-5402805160992455">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">
    <a href="index.html" class="lang-switch">🏠 홈으로</a>
    <button id="theme-toggle" class="theme-toggle-btn">🌙 다크 모드</button>
</div>

<div class="container">
    <header>
        <h1>🐶 AI 동물상 테스트 🐱</h1>
        <p>사진을 업로드하여 나의 동물상 찾기</p>
    </header>

    <div class="recommend-box">
        <div id="image-container" class="webcam-display">
            <img id="face-image" src="" alt="업로드된 이미지" style="display: none; width: 100%; height: 100%; object-fit: cover;">
            <div id="loading-text">분석할 사진을 업로드해주세요!</div>
        </div>
        
        <div class="file-upload-wrapper">
            <input type="file" id="image-input" accept="image/*" class="file-input" onchange="handleImageUpload(event)">
            <label for="image-input" class="recommend-btn">사진 업로드하기</label>
        </div>

        <div id="label-container" class="result-label-container"></div>
    </div>

    <div class="info-box">
        <p>※ 업로드된 사진은 서버에 저장되지 않으며, 브라우저에서 즉시 분석됩니다.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/Csu6wKHGU/";

    let model, labelContainer, maxPredictions;

    // Load the model on page load
    async function loadModel() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();
    }
    loadModel();

    async function handleImageUpload(event) {
        const input = event.target;
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            const loadingText = document.getElementById("loading-text");
            const faceImage = document.getElementById("face-image");
            
            loadingText.innerHTML = "분석 중...";
            
            reader.onload = async function(e) {
                faceImage.src = e.target.result;
                faceImage.style.display = "block";
                loadingText.style.display = "none";
                
                // Wait for image to load before predicting
                faceImage.onload = async function() {
                    await predict();
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function predict() {
        if (!model) await loadModel();
        
        const faceImage = document.getElementById("face-image");
        const prediction = await model.predict(faceImage);
        
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        
        for (let i = 0; i < maxPredictions; i++) {
            const probability = (prediction[i].probability * 100).toFixed(0);
            
            const barContainer = document.createElement("div");
            barContainer.className = "prediction-bar-container";
            
            const label = document.createElement("span");
            label.className = "prediction-label";
            label.innerHTML = `${prediction[i].className}: ${probability}%`;
            
            const barWrapper = document.createElement("div");
            barWrapper.className = "bar-wrapper";
            
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.width = probability + "%";
            
            // Highlight the highest probability
            if (probability > 50) {
                bar.style.backgroundColor = "var(--accent-color)";
            } else {
                bar.style.backgroundColor = "#ccc";
            }
            
            barWrapper.appendChild(bar);
            barContainer.appendChild(label);
            barContainer.appendChild(barWrapper);
            labelContainer.appendChild(barContainer);
        }
    }

    // Theme toggle support
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    
    themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        themeToggle.textContent = newTheme === 'light' ? '🌙 다크 모드' : '☀️ 라이트 모드';
    });
    themeToggle.textContent = savedTheme === 'light' ? '🌙 다크 모드' : '☀️ 라이트 모드';
</script>
</body>
</html>
